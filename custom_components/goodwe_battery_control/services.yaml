clear_overrides:
  name: Clear overrides
  description: >-
    Return the inverter to self-use mode, clearing all or selected overrides.
  fields:
    mode:
      name: Mode
      description: >-
        Only clear overrides of this mode. If not set, all overrides are cleared.
      selector:
        select:
          options:
            - SelfUse
            - ForceCharge
            - ForceDischarge
            - Backup
            - Feedin

feedin:
  name: Feed-in
  description: >-
    Prioritise feeding excess solar to the grid for a set duration, optionally at a specific time and power limit.
  fields:
    duration:
      name: Duration
      description: How long to feed in (max 4 hours, must not cross midnight).
      required: true
      selector:
        duration:
    power:
      name: Power limit
      description: >-
        Feed-in power limit in watts. Defaults to inverter rated power if not set.
      selector:
        number:
          min: 100
          unit_of_measurement: W
    start_time:
      name: Start time
      description: >-
        Time of day to start the override. Defaults to now if not set.
      selector:
        time:

force_charge:
  name: Force charge
  description: >-
    Charge the battery for a set duration, optionally at a specific time and power limit. The inverter automatically reverts to self-use when the window ends.
  fields:
    duration:
      name: Duration
      description: How long to force charge (max 4 hours, must not cross midnight).
      required: true
      selector:
        duration:
    power:
      name: Power limit
      description: >-
        Charge power limit in watts. Defaults to inverter rated power if not set.
      selector:
        number:
          min: 100
          unit_of_measurement: W
    start_time:
      name: Start time
      description: >-
        Time of day to start the override. Defaults to now if not set.
      selector:
        time:

force_discharge:
  name: Force discharge
  description: >-
    Discharge the battery for a set duration, optionally at a specific time and power limit. The inverter automatically reverts to self-use when the window ends.
  fields:
    duration:
      name: Duration
      description: How long to force discharge (max 4 hours, must not cross midnight).
      required: true
      selector:
        duration:
    power:
      name: Power limit
      description: >-
        Discharge power limit in watts. Defaults to inverter rated power if not set.
      selector:
        number:
          min: 100
          unit_of_measurement: W
    start_time:
      name: Start time
      description: >-
        Time of day to start the override. Defaults to now if not set.
      selector:
        time:

smart_charge:
  name: Smart charge
  description: >-
    Charge the battery within a time window, periodically adjusting the charge rate to reach a target SoC by the end of the interval.
  fields:
    start_time:
      name: Start time
      description: Time of day to start charging.
      required: true
      selector:
        time:
    end_time:
      name: End time
      description: Time of day to stop charging. Must be after start time, within 4 hours.
      required: true
      selector:
        time:
    target_soc:
      name: Target SoC
      description: >-
        Charge the battery to this SoC level. Charging stops and reverts to self-use when reached.
      required: true
      selector:
        number:
          min: 5
          max: 100
          unit_of_measurement: "%"
    power:
      name: Maximum power
      description: >-
        Maximum charge power in watts. The actual power may be lower to pace charging to the end of the window.
      selector:
        number:
          min: 100
          unit_of_measurement: W

smart_discharge:
  name: Smart discharge
  description: >-
    Discharge the battery within a time window, automatically reverting to self-use when a minimum SoC is reached.
  fields:
    start_time:
      name: Start time
      description: Time of day to start discharging.
      required: true
      selector:
        time:
    end_time:
      name: End time
      description: Time of day to stop discharging. Must be after start time, within 4 hours.
      required: true
      selector:
        time:
    power:
      name: Power limit
      description: >-
        Discharge power limit in watts. Defaults to inverter rated power if not set.
      selector:
        number:
          min: 100
          unit_of_measurement: W
    min_soc:
      name: Minimum SoC to stop discharge
      description: >-
        Stop discharging and revert to self-use when the battery reaches this level.
      required: true
      selector:
        number:
          min: 5
          max: 100
          unit_of_measurement: "%"
    feedin_energy_limit_kwh:
      name: Feed-in energy limit
      description: >-
        Stop discharging after this much energy (kWh) has been fed into the grid. This is the excess energy exported beyond household self-consumption.
      selector:
        number:
          min: 0.1
          step: 0.1
          unit_of_measurement: kWh
