name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Wait for commit CI workflows to pass
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="${{ github.sha }}"
          repo="${{ github.repository }}"

          required=("Lint & Test" "Hassfest" "HACS" "Smart Battery Drift Check")
          echo "Waiting for ${#required[@]} workflows on $sha"

          for i in $(seq 1 60); do
            all_passed=true
            for name in "${required[@]}"; do
              status=$(gh api "repos/$repo/actions/runs?head_sha=$sha&event=push" \
                --jq ".workflow_runs[] | select(.name == \"$name\") | .conclusion" \
                2>/dev/null | head -1)
              if [ "$status" = "success" ]; then
                echo "✓ $name"
              elif [ "$status" = "failure" ] || [ "$status" = "cancelled" ]; then
                echo "✗ $name ($status)"
                exit 1
              else
                echo "· $name (pending)"
                all_passed=false
              fi
            done
            if $all_passed; then
              echo "All required workflows passed"
              exit 0
            fi
            sleep 20
          done
          echo "Timed out waiting for workflows"
          exit 1

  release:
    needs: [gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Get manifest version
        id: manifest
        run: |
          version=$(jq -r .version custom_components/goodwe_battery_control/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify versions match
        run: |
          if [ "${{ steps.tag.outputs.version }}" != "${{ steps.manifest.outputs.version }}" ]; then
            echo "::error::Tag v${{ steps.tag.outputs.version }} does not match manifest version ${{ steps.manifest.outputs.version }}"
            exit 1
          fi

      - name: Extract changelog
        id: changelog
        run: |
          version="${{ steps.tag.outputs.version }}"
          body=$(awk -v ver="## ${version}" '
            $0 == ver { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md)
          echo "$body" > /tmp/release_body.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_body.md
          prerelease: ${{ contains(github.ref_name, '-') }}
